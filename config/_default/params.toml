colorScheme = "ocean"
defaultAppearance = "dark"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true
enableMathNotation = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true

[header]
  layout = "fixed"

[footer]
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[article]
  showDate = true
  showViews = false
  showLikes = false
  showAuthor = true
  showTableOfContents = true
  showSummary = true
  showReadingTime = true
  showWordCount = true
  showEdit = false
  sharingLinks = []

[list]
  showCards = true
  groupByYear = true
  cardView = true

[sitemap]
  excludedKinds = []
